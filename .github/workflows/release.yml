name: Release

on:
  push:
    tags: [v*]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-2022
            binary_name: mf.exe
            asset_name: mf-x86_64-pc-windows-msvc.exe
            target: ''
          - os: ubuntu-22.04
            binary_name: mf
            asset_name: mf-x86_64-unknown-linux-musl
            target: x86_64-unknown-linux-musl
          - os: macos-14
            binary_name: mf
            asset_name: mf-aarch64-apple-darwin
            target: ''

      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation target
        if: matrix.target != ''
        run: rustup target add ${{ matrix.target }}

      - name: Build release
        run: cargo build --release ${{ matrix.target != '' && format('--target {0}', matrix.target) || '' }}

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.target != '' && format('target/{0}/release/', matrix.target) || 'target/release/' }}${{ matrix.binary_name }}

  create-release:
    needs: build
    runs-on: ubuntu-22.04

    # 授予写入权限以允许创建 GitHub Release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 如果 Release 已存在则跳过创建（支持重跑）
          gh release view "${{ github.ref_name }}" > /dev/null 2>&1 \
            || gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              --latest

          # 排查：打印 artifacts 目录结构
          echo "=== artifacts directory structure ==="
          find artifacts -type f -o -type d | head -50
          echo "=== end ==="

          # 将产物重命名并移到扁平目录，再批量上传
          mkdir -p renamed
          for dir in artifacts/*/; do
            asset_name="$(basename "$dir")"
            for file in "$dir"*; do
              [ -f "$file" ] || continue
              mv "$file" "renamed/$asset_name"
            done
          done
          rm -rf artifacts
          gh release upload "${{ github.ref_name }}" renamed/* --clobber
