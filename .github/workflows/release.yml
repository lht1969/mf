name: Release

on:
  push:
    tags: [v*]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-2022
            binary_name: mf.exe
            asset_name: mf-x86_64-pc-windows-msvc.exe
          - os: ubuntu-22.04
            binary_name: mf
            asset_name: mf-x86_64-unknown-linux-musl
          - os: macos-14
            binary_name: mf
            asset_name: mf-aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      - name: Upload binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/release/${{ matrix.binary_name }}

  create-release:
    needs: build
    runs-on: ubuntu-22.04

    # 授予写入权限以允许创建 GitHub Release
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # 先创建 Release（不含产物）
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

          # 逐个上传构建产物（避免 glob 匹配问题）
          find artifacts -type f -exec gh release upload "${{ github.ref_name }}" {} \;
